# shj_void — Sung Jin-Woo Shadow Monarch Capsule
# Standalone compose file. For empire stack, merge into docker-compose.empire.yml

version: "3.9"

services:
  shj_void_ui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: shj_void_ui
    ports:
      - "8004:8080"
    volumes:
      - open-webui-shj:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.containers.internal:11434
      - WEBUI_SECRET_KEY=shj_void_shadow_key
      - DEFAULT_MODELS=mistral:7b-instruct
      - AGENT_NAME=shj_void
      - PERSONA=sung_jin_woo
      - STEALTH_MODE=true
      - LOG_ZERO=true
    restart: unless-stopped
    networks:
      - empire_net

volumes:
  open-webui-shj:

networks:
  empire_net:
    # Comment out 'external: true' for standalone testing
    # Uncomment when running as part of the full empire stack
    driver: bridge
    # external: true
